<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контора — Бриф на стикеры</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-dark: #1a0e14;
  --bg-card: #261620;
  --bg-input: #1a0e14;
  --pink: #f2c4d0;
  --pink-light: #f8dce5;
  --pink-muted: #d4a0b0;
  --purple: #a855f7;
  --purple-dark: #7c3aed;
  --purple-light: #c084fc;
  --text-white: #f5eef0;
  --text-muted: #9a7a88;
  --text-dark: #2a1520;
  --border: #3a2430;
  --error: #f43f5e;
  --radius: 14px;
  --radius-sm: 10px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-dark);
  color: var(--text-white);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  background: linear-gradient(180deg, #2a1620 0%, var(--bg-dark) 100%);
  padding: 24px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-logo img {
  height: 40px;
  display: block;
}

.header-info {
  text-align: right;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
}

.header-info a {
  color: var(--pink);
  text-decoration: none;
}

/* ── Progress ── */
.progress-wrap {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  position: sticky;
  top: 72px;
  z-index: 99;
}

.progress-inner {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 0;
  padding: 14px 0;
}

.progress-step {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  cursor: pointer;
  transition: var(--transition);
}

.step-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 13px;
  background: var(--border);
  color: var(--text-muted);
  transition: var(--transition);
  flex-shrink: 0;
}

.step-num.active {
  background: linear-gradient(135deg, var(--purple-dark), var(--purple));
  color: #fff;
  box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
}

.step-num.done {
  background: var(--purple);
  color: #fff;
}

.step-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  transition: var(--transition);
  white-space: nowrap;
}

.step-label.active { color: var(--pink); font-weight: 600; }
.step-label.done { color: var(--pink-muted); }

.step-line {
  flex: 0 0 40px;
  height: 2px;
  background: var(--border);
  transition: var(--transition);
}

.step-line.done { background: var(--purple); }

/* ── Container ── */
.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 24px 100px;
}

/* ── Block Title ── */
.block-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 28px;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  line-height: 1.2;
  color: var(--pink);
}

.block-subtitle {
  font-size: 15px;
  color: var(--text-muted);
  margin-bottom: 36px;
  line-height: 1.6;
}

/* ── Field Group ── */
.field-group {
  margin-bottom: 28px;
  animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.field-group:nth-child(2) { animation-delay: 0.05s; }
.field-group:nth-child(3) { animation-delay: 0.1s; }
.field-group:nth-child(4) { animation-delay: 0.15s; }
.field-group:nth-child(5) { animation-delay: 0.2s; }
.field-group:nth-child(6) { animation-delay: 0.25s; }
.field-group:nth-child(7) { animation-delay: 0.3s; }

.field-label {
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-white);
}

.field-label .num {
  font-size: 12px;
  color: var(--purple-light);
  font-weight: 500;
}

.field-label .req {
  color: var(--error);
  font-size: 16px;
  line-height: 1;
}

.field-hint {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 10px;
  line-height: 1.5;
}

.field-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  color: var(--text-white);
  background: var(--bg-input);
  transition: var(--transition);
  outline: none;
  resize: vertical;
}

.field-input::placeholder { color: #5a3a4a; }
.field-input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(168,85,247,0.15); }
.field-input.has-error { border-color: var(--error); }

textarea.field-input { min-height: 90px; line-height: 1.6; }

.field-error {
  font-size: 12px;
  color: var(--error);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ── Choice Cards ── */
.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.choices.single-col { grid-template-columns: 1fr; }

.choice-card {
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-card);
  user-select: none;
  color: var(--text-muted);
}

.choice-card:hover { border-color: var(--purple-light); background: #2e1a28; }

.choice-card.selected {
  border-color: var(--purple);
  background: linear-gradient(135deg, var(--purple-dark), var(--purple));
  color: #fff;
  box-shadow: 0 4px 16px rgba(168, 85, 247, 0.25);
}

.choice-radio {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid var(--text-muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.choice-card.selected .choice-radio { border-color: rgba(255,255,255,0.6); }

.choice-radio-inner {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: transparent;
  transition: var(--transition);
}

.choice-card.selected .choice-radio-inner { background: #fff; }

.choice-check {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  border: 2px solid var(--text-muted);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  font-size: 12px;
  color: transparent;
}

.choice-card.selected .choice-check { border-color: rgba(255,255,255,0.6); color: #fff; }

.choice-text {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.4;
}

.choices-error {
  border: 2px solid var(--error);
  border-radius: var(--radius);
  padding: 2px;
}

/* ── Navigation ── */
.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 48px;
  gap: 16px;
}

.btn {
  padding: 14px 32px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: var(--transition);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.btn-primary {
  background: linear-gradient(135deg, var(--purple-dark), var(--purple));
  color: #fff;
  box-shadow: 0 4px 20px rgba(168, 85, 247, 0.3);
}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(168, 85, 247, 0.4); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: transparent;
  color: var(--text-muted);
  border: 2px solid var(--border);
}

.btn-secondary:hover { border-color: var(--purple-light); color: var(--pink); }

.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

/* ── Review ── */
.review-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  animation: fadeUp 0.4s ease both;
}

.review-block-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--purple-light);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.review-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  gap: 16px;
}

.review-label {
  font-size: 13px;
  color: var(--text-muted);
  flex-shrink: 0;
}

.review-value {
  font-size: 14px;
  font-weight: 500;
  text-align: right;
  word-break: break-word;
  color: var(--text-white);
}

.review-value.empty { color: var(--text-muted); font-style: italic; font-weight: 400; opacity: 0.5; }

/* ── Success ── */
.success-screen {
  text-align: center;
  padding: 80px 24px;
  animation: fadeUp 0.5s ease both;
}

.success-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple-dark), var(--purple));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 24px;
  box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
}

.success-title {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 28px;
  margin-bottom: 12px;
  color: var(--pink);
}

.success-text {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.7;
  max-width: 420px;
  margin: 0 auto;
}

/* ── Sending ── */
.sending-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26, 14, 20, 0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--error);
  color: white;
  padding: 14px 24px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  z-index: 1001;
  transition: transform 0.3s ease;
  max-width: 90vw;
  text-align: center;
}

.toast.visible { transform: translateX(-50%) translateY(0); }

/* ── Responsive ── */
@media (max-width: 600px) {
  .header { padding: 16px; }
  .header-logo img { height: 30px; }
  .header-info { display: none; }
  .progress-wrap { padding: 0 16px; top: 56px; }
  .step-label { display: none; }
  .step-line { flex: 0 0 20px; }
  .container { padding: 28px 16px 80px; }
  .block-title { font-size: 22px; }
  .choices { grid-template-columns: 1fr; }
  .nav-bar { flex-direction: column; }
  .btn { width: 100%; text-align: center; }
}
</style>

function TextField({ label, num, hint, value, onChange, multiline, placeholder, required, error }) {
  return (
    <div className="field-group">
      <div className="field-label">
        {num && <span className="num">{num}</span>}
        {label}
        {required && <span className="req">*</span>}
      </div>
      {hint && <div className="field-hint">{hint}</div>}
      {multiline ? (
        <textarea
          className={`field-input ${error ? 'has-error' : ''}`}
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder || ""}
        />
      ) : (
        <input
          className={`field-input ${error ? 'has-error' : ''}`}
          type="text"
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder={placeholder || ""}
        />
      )}
      {error && <div className="field-error">⚠ {error}</div>}
    </div>
  );
}

function SingleChoice({ label, num, hint, options, value, onChange, required, error }) {
  return (
    <div className="field-group">
      <div className="field-label">
        {num && <span className="num">{num}</span>}
        {label}
        {required && <span className="req">*</span>}
      </div>
      {hint && <div className="field-hint">{hint}</div>}
      <div className={`choices ${error ? 'choices-error' : ''}`}>
        {options.map(opt => (
          <div
            key={opt.id}
            className={`choice-card ${value === opt.id ? 'selected' : ''}`}
            onClick={() => onChange(opt.id)}
          >
            <div className="choice-radio"><div className="choice-radio-inner" /></div>
            <div className="choice-text">{opt.label}</div>
          </div>
        ))}
      </div>
      {error && <div className="field-error">⚠ {error}</div>}
    </div>
  );
}

function MultiChoice({ label, num, hint, options, value, onChange, required, error }) {
  const toggle = (id) => {
    if (value.includes(id)) onChange(value.filter(v => v !== id));
    else onChange([...value, id]);
  };
  return (
    <div className="field-group">
      <div className="field-label">
        {num && <span className="num">{num}</span>}
        {label}
        {required && <span className="req">*</span>}
      </div>
      {hint && <div className="field-hint">{hint}</div>}
      <div className={`choices single-col ${error ? 'choices-error' : ''}`}>
        {options.map(opt => (
          <div
            key={opt.id}
            className={`choice-card ${value.includes(opt.id) ? 'selected' : ''}`}
            onClick={() => toggle(opt.id)}
          >
            <div className="choice-check">{value.includes(opt.id) ? '✓' : ''}</div>
            <div className="choice-text">{opt.label}</div>
          </div>
        ))}
      </div>
      {error && <div className="field-error">⚠ {error}</div>}
    </div>
  );
}

      `\u{1f4e6} Тип: ${typeName}`,
      `\u{1f522} Кол-во стикеров: ${stickerCount || "\u2014"}`,
      `\u{1f3af} Задача: ${purposeNames}`,
      `\u{1f4ad} Концепция: ${concept || "\u2014"}`,
      `\u{1f3a8} Стиль: ${styleName}`,
      `\u{1f4d8} Брендбук: ${brandbook || "\u2014"}`,
      `\u270d\ufe0f Надписи: ${inscriptions || "\u2014"}`,
      `\u{1f517} Референсы: ${references || "\u2014"}`,
      `\u{1f4ac} Комментарии: ${comments || "\u2014"}`,
    ].join("\n");
  };

  const handleSubmit = async () => {
    if (TELEGRAM_BOT_TOKEN === "YOUR_BOT_TOKEN_HERE") {
      showToast("\u26a0\ufe0f Укажите TELEGRAM_BOT_TOKEN и TELEGRAM_CHAT_ID в коде");
      return;
    }
    setSending(true);
    try {
      const resp = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: buildMessage(),
          parse_mode: "Markdown",
        }),
      });
      const data = await resp.json();
      if (data.ok) setSent(true);
      else showToast("Ошибка: " + (data.description || "Неизвестная ошибка"));
    } catch (err) {
      showToast("Ошибка сети: " + err.message);
    } finally {
      setSending(false);
    }
  };

  const ReviewRow = ({ label, value }) => {
    const v = Array.isArray(value) ? (value.length ? value.join(", ") : null) : (value || null);
    return (
      <div className="review-row">
        <span className="review-label">{label}</span>
        <span className={`review-value ${!v ? 'empty' : ''}`}>{v || "не указано"}</span>
      </div>
    );
  };

  if (sent) {
    return (
      <React.Fragment>
        <div className="header">
          <div className="header-logo"><img src={LOGO_SRC} alt="Контора" /></div>
        </div>
        <div className="success-screen">
          <div className="success-icon">{"\u2713"}</div>
          <div className="success-title">Бриф отправлен!</div>
          <div className="success-text">
            Спасибо за заполнение. Наш менеджер свяжется с вами
            в ближайшее время для уточнения деталей и расчёта стоимости.
          </div>
        </div>
      </React.Fragment>
    );
  }

  return (
    <React.Fragment>
      <div className="header">
        <div className="header-logo"><img src={LOGO_SRC} alt="Контора" /></div>
        <div className="header-info">
          <a href="https://kontora.su" target="_blank" rel="noopener">kontora.su</a><br/>
          +7 (999) 041 31-08
        </div>
      </div>

      <div className="progress-wrap">
        <div className="progress-inner">
          {STEPS.map((s, i) => (
            <React.Fragment key={s.id}>
              <div className="progress-step" onClick={() => { if (s.id < step) goTo(s.id); }}>
                <div className={`step-num ${step === s.id ? 'active' : step > s.id ? 'done' : ''}`}>
                  {step > s.id ? '\u2713' : s.id}
                </div>
                <span className={`step-label ${step === s.id ? 'active' : step > s.id ? 'done' : ''}`}>
                  {s.title}
                </span>
              </div>
              {i < STEPS.length - 1 && (
                <div className={`step-line ${step > s.id ? 'done' : ''}`} />
              )}
            </React.Fragment>
          ))}
        </div>
      </div>

      <div className="container" key={shakeKey}>
        {/* ── STEP 1 ── */}
        {step === 1 && (
          <div>
            <div className="block-title">Информация о компании</div>
            <div className="block-subtitle">
              Расскажите о себе, чтобы мы лучше поняли ваш бренд и задачи
            </div>

            <TextField num="1.1" label="Название компании" required
              hint="Бренд, продукт или сервис, для которого разрабатываем дизайн"
              value={companyName} onChange={setCompanyName}
              placeholder="Например: CoffeeShop или Мой Бренд"
              error={errors.companyName}
            />
            <TextField num="1.2" label="Описание продукта или услуги"
              hint="Продуктовая линейка, область применения, почему люди покупают"
              value={productDesc} onChange={setProductDesc} multiline
              placeholder="Расскажите коротко о вашем продукте..."
            />
            <TextField num="1.3" label="Контактное лицо" required
              hint="ФИО и должность"
              value={contactName} onChange={setContactName}
              placeholder="Иванов Иван, маркетолог"
              error={errors.contactName}
            />
            <TextField num="1.4" label="Способы связи" required
              hint="Телефон, e-mail, Telegram"
              value={contactMethods} onChange={setContactMethods}
              placeholder="+7 (___) ___ ____  /  @telegram"
              error={errors.contactMethods}
            />
            <TextField num="1.5" label="Сайт"
              hint="При наличии"
              value={website} onChange={setWebsite}
              placeholder="https://"
            />
            <TextField num="1.6" label="Социальные сети"
              hint="При наличии"
              value={socials} onChange={setSocials}
              placeholder="Instagram, VK, Telegram-канал..."
            />

            <div className="nav-bar">
              <div />
              <button className="btn btn-primary" onClick={() => handleNext(2, validateStep1)}>
                Далее →
              </button>
            </div>
          </div>
        )}

        {/* ── STEP 2 ── */}
        {step === 2 && (
          <div>
            <div className="block-title">Маркетинг</div>
            <div className="block-subtitle">
              Помогите нам понять вашу аудиторию и позиционирование
            </div>

            <TextField num="2.1" label="Целевая аудитория" required
              hint="Кто ваши клиенты? Возраст, интересы, стиль жизни"
              value={targetAudience} onChange={setTargetAudience} multiline
              placeholder="Молодёжь 18-30, увлекаются..."
              error={errors.targetAudience}
            />
            <TextField num="2.2" label="Конкурентные преимущества"
              hint="Чем вы выделяетесь на фоне конкурентов?"
              value={advantages} onChange={setAdvantages} multiline
              placeholder="Мы единственные, кто..."
            />
            <TextField num="2.3" label="Основные конкуренты"
              hint="Кого считаете конкурентами?"
              value={competitors} onChange={setCompetitors} multiline
              placeholder="Компания А, Компания Б..."
            />

            <div className="nav-bar">
              <button className="btn btn-secondary" onClick={() => goTo(1)}>← Назад</button>
              <button className="btn btn-primary" onClick={() => handleNext(3, validateStep2)}>Далее →</button>
            </div>
          </div>
        )}

        {/* ── STEP 3 ── */}
        {step === 3 && (
          <div>
            <div className="block-title">Детали заказа</div>
            <div className="block-subtitle">
              Расскажите, что именно нужно сделать и каким вы видите результат
            </div>

            <SingleChoice num="3.1" label="Что разрабатываем?" required
              options={PRODUCT_TYPES} value={productType} onChange={setProductType}
              error={errors.productType}
            />
            <TextField label="Количество стикеров в наборе" required
              value={stickerCount} onChange={setStickerCount}
              placeholder="Например: 8 штук"
              error={errors.stickerCount}
            />
            <MultiChoice num="3.2" label="Какую задачу решают стикеры?" required
              hint="Можно выбрать несколько"
              options={PURPOSES} value={purpose} onChange={setPurpose}
              error={errors.purpose}
            />
            <TextField num="3.3" label="Идея или концепция"
              hint="Сюжет, персонажи, фразы. Если идей нет — готовы ли доверить дизайнеру?"
              value={concept} onChange={setConcept} multiline
              placeholder="Хочу стикеры с котиками в стиле аниме с фразами..."
            />
            <SingleChoice num="3.4" label="Какой стиль ближе?" required
              options={STYLES_LIST} value={designStyle} onChange={setDesignStyle}
              error={errors.designStyle}
            />
            <TextField num="3.5" label="Брендбук или фирменный стиль"
              hint="Есть ли у вас гайдлайны? Если нет — опишите ограничения"
              value={brandbook} onChange={setBrandbook} multiline
              placeholder="Есть брендбук, пришлю файлом / Нет, но хотим синие тона..."
            />
            <TextField num="3.6" label="Надписи на стикерах"
              hint="Напишите те, которые точно хотите видеть"
              value={inscriptions} onChange={setInscriptions} multiline
              placeholder="«Привет!», «Спасибо», «#нашбренд»..."
            />
            <TextField num="3.7" label="Референсы и примеры"
              hint="Ссылки на стили или примеры, которые вам нравятся"
              value={references} onChange={setReferences} multiline
              placeholder="https://pinterest.com/..., https://instagram.com/..."
            />
            <TextField label="Свободные комментарии"
              hint="Что ещё важно учесть?"
              value={comments} onChange={setComments} multiline
              placeholder="Дополнительные пожелания..."
            />

            <div className="nav-bar">
              <button className="btn btn-secondary" onClick={() => goTo(2)}>← Назад</button>
              <button className="btn btn-primary" onClick={() => handleNext(4, validateStep3)}>Проверить →</button>
            </div>
          </div>
        )}

        {/* ── STEP 4 ── */}
        {step === 4 && (
          <div>
            <div className="block-title">Проверьте данные</div>
            <div className="block-subtitle">
              Убедитесь, что всё заполнено верно, и отправьте бриф
            </div>

            <div className="review-block">
              <div className="review-block-title">1 · О компании</div>
              <ReviewRow label="Компания" value={companyName} />
              <ReviewRow label="Продукт" value={productDesc} />
              <ReviewRow label="Контакт" value={contactName} />
              <ReviewRow label="Связь" value={contactMethods} />
              <ReviewRow label="Сайт" value={website} />
              <ReviewRow label="Соцсети" value={socials} />
            </div>

            <div className="review-block">
              <div className="review-block-title">2 · Маркетинг</div>
              <ReviewRow label="ЦА" value={targetAudience} />
              <ReviewRow label="Преимущества" value={advantages} />
              <ReviewRow label="Конкуренты" value={competitors} />
            </div>

            <div className="review-block">
              <div className="review-block-title">3 · Заказ</div>
              <ReviewRow label="Тип" value={PRODUCT_TYPES.find(t => t.id === productType)?.label} />
              <ReviewRow label="Кол-во" value={stickerCount} />
              <ReviewRow label="Задача" value={purpose.map(p => PURPOSES.find(x => x.id === p)?.label).filter(Boolean)} />
              <ReviewRow label="Концепция" value={concept} />
              <ReviewRow label="Стиль" value={STYLES_LIST.find(s => s.id === designStyle)?.label} />
              <ReviewRow label="Брендбук" value={brandbook} />
              <ReviewRow label="Надписи" value={inscriptions} />
              <ReviewRow label="Референсы" value={references} />
              <ReviewRow label="Комментарии" value={comments} />
            </div>

            <div className="nav-bar">
              <button className="btn btn-secondary" onClick={() => goTo(3)}>← Назад</button>
              <button className="btn btn-primary" onClick={handleSubmit} disabled={sending}>
                Отправить бриф ✓
              </button>
            </div>
          </div>
        )}
      </div>

      {sending && <div className="sending-overlay"><div className="spinner" /></div>}
      <div className={`toast ${toast ? 'visible' : ''}`}>{toast}</div>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(React.createElement(App));
</script>
</body>
</html>
